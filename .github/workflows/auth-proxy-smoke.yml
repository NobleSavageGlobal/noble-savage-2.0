name: Auth Proxy Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  auth-proxy-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
        working-directory: backend

      - name: Start frontend
        run: |
          nohup npm run start > /tmp/frontend.log 2>&1 &
        working-directory: frontend
        env:
          INTERNAL_API_URL: http://127.0.0.1:8000

      - name: Wait for backend
        run: |
          for i in {1..45}; do
            if curl -sS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become ready"
          cat /tmp/backend.log || true
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..45}; do
            if curl -sS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to become ready"
          cat /tmp/frontend.log || true
          exit 1

      - name: Run auth proxy smoke script
        run: bash ./scripts/smoke_auth_proxy.sh

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== backend.log ==="
          cat /tmp/backend.log || true
          echo "=== frontend.log ==="
          cat /tmp/frontend.log || true
